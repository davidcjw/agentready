<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Antenna stem -->
  <rect x="15" y="5" width="2" height="5" rx="1" fill="white" opacity="0.95"/>
  <!-- Antenna ball -->
  <circle cx="16" cy="4.5" r="2.5" fill="white" opacity="0.95"/>

  <!-- Head -->
  <rect x="6" y="10" width="20" height="15" rx="3" fill="white" opacity="0.95"/>

  <!-- Eyes -->
  <rect x="9"  y="13.5" width="5" height="4.5" rx="1.5" fill="#7c3aed"/>
  <rect x="18" y="13.5" width="5" height="4.5" rx="1.5" fill="#7c3aed"/>

  <!-- Mouth -->
  <rect x="10" y="20" width="12" height="2.5" rx="1.25" fill="#7c3aed"/>
</svg>
